name: Deploy SOC Infrastructure (Bicep)

on:
  push:
    branches:
      - main


jobs:
  deploy-bicep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Main Infrastructure
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: 'rg-soc-sweden'
          template: ./Azure/01-cloud-native-soc/infrastructure/main.bicep
          failOnStdErr: false
